name: scatterview
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - numpy
  - scipy
  - numba
  - pandas
  - pytables
  - h5py
  - pyqt6
  - pillow
  - pip
  - pip:
    - pygfx>=0.7
    - wgpu>=0.18
    - rendercanvas
    - av
    # On WSL2 or headless Linux, set WGPU_BACKEND_TYPE=Vulkan so the
    # lavapipe / Mesa driver is picked over the D3D12-via-OpenGL shim
    # (which lacks float32-filterable).  scatterview/__init__.py does
    # this automatically on Linux unless the env var is already set.
